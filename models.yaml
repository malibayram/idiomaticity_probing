# Model registry for the idiomaticity probing framework.
#
# Each entry becomes a pluggable embedder. `type` selects the embedder implementation:
#   static      -> gensim KeyedVectors (Word2Vec / GloVe / fastText)   [needs `path`]
#   transformer -> HuggingFace AutoModel encoder (BERT, XLM-R, BERTurk) [needs `hf_id`]
#   causal      -> HuggingFace AutoModelForCausalLM (Llama, Qwen, ...)  [needs `hf_id`]
#   sentence    -> sentence-transformers (SBERT, BGE, E5, GTE)          [needs `hf_id`]
#   mock        -> dependency-free deterministic vectors (smoke test only)
#
# Run a subset with: scripts/run_experiment.py --models models.yaml --select mBERT XLM-R-large
#
# ============================================================================
# SELECTED STUDY: lightweight EN+PT cohort (encoder + embedding models, CPU-friendly).
# All models below are multilingual, so they cover both EN and PT in one run.
#
#   OLD (paper-era):  mBERT  DistilBERT-ML  mSBERT
#   NEW (modern):     XLM-R-large  BGE-M3  E5-large
#
# Reproduce the central comparison:
#   python scripts/run_experiment.py --models models.yaml \
#       --select mBERT DistilBERT-ML mSBERT XLM-R-large BGE-M3 E5-large \
#       --data data/ncimp --lang EN --context naturalistic neutral --level nc --out runs/en
#   python scripts/analyze.py --results runs/en/results.csv --out runs/en --level nc \
#       --old mBERT DistilBERT-ML mSBERT --new XLM-R-large BGE-M3 E5-large
# (repeat with --lang PT for Portuguese)
# ============================================================================

models:
  # ---- Smoke test (no downloads) ----
  - name: mock
    type: mock
    dim: 128

  # ---- Models from the original paper ----
  - name: mBERT
    type: transformer
    hf_id: bert-base-multilingual-cased
    last_n_layers: 4

  - name: DistilBERT-ML
    type: transformer
    hf_id: distilbert-base-multilingual-cased
    last_n_layers: 4

  - name: mSBERT
    type: sentence
    hf_id: sentence-transformers/distiluse-base-multilingual-cased

  # ---- New / modern models to extend the study (Phase 7) ----
  - name: XLM-R-large
    type: transformer
    hf_id: xlm-roberta-large
    last_n_layers: 4

  - name: BGE-M3
    type: sentence
    hf_id: BAAI/bge-m3

  - name: E5-large
    type: sentence
    hf_id: intfloat/multilingual-e5-large

  # ---- Modern SOTA embedding models (sentence-level), 2025-2026 ONLY ----
  # METHODOLOGY: these are sentence-embedding models. In our framework they map to `sentence`:
  #   --level sentence  -> full-sentence embedding (paper's sentence level)
  #   --level nc        -> ISOLATED PHRASE embedding (the span text re-encoded on its own)
  # They do NOT give a *contextual token span* (unlike BERT/XLM-R/Qwen hidden states).
  # Per request, only newest high-performing models are active here; 2024-era models are
  # commented out below.
  - name: Qwen3-Emb-0.6B # Qwen3-Embedding (2025)
    type: sentence
    hf_id: Qwen/Qwen3-Embedding-0.6B

  - name: Qwen3-Emb-4B # Qwen3-Embedding (2025)
    type: sentence
    hf_id: Qwen/Qwen3-Embedding-4B
    dtype: float16

  - name: Qwen3-Emb-8B # Qwen3-Embedding (2025); ~70.58 multilingual MTEB
    type: sentence
    hf_id: Qwen/Qwen3-Embedding-8B
    dtype: float16

  - name: Harrier-OSS-0.6B # Microsoft Harrier-OSS-v1 (2026, MIT)
    type: sentence
    hf_id: microsoft/harrier-oss-v1-0.6b
    trust_remote_code: true

  - name: Harrier-OSS-270M # Microsoft Harrier-OSS-v1 (2026, MIT); tiny control
    type: sentence
    hf_id: microsoft/harrier-oss-v1-270m
    trust_remote_code: true

  - name: llama-embed-nemotron-8b # NVIDIA (Oct 2025): #1 open multilingual MTEB. NON-COMMERCIAL license.
    type: sentence
    hf_id: nvidia/llama-embed-nemotron-8b
    trust_remote_code: true
    dtype: float16

  # ---- REMOVED: 2024-era / older-generation embedding models (excluded by request) ----
  # mE5-large-instruct (intfloat/multilingual-e5-large-instruct) -- 2024; already run once as reference
  # gte-Qwen2-1.5B/7B-instruct (Alibaba-NLP) -- Qwen2-based 2024; also breaks on transformers 5.8.1
  # NV-Embed-v2 (nvidia/NV-Embed-v2) -- 2024
  # bge-en-icl (BAAI/bge-en-icl) -- 2024, English-focused

  # ---- API embedding models (need an `api` embedder + keys; not yet implemented) ----
  # gemini-embedding-2 / voyage-4-large / cohere embed-v4.0 / text-embedding-3-large
  # These return sentence/phrase embeddings only (no contextual span). Add via a future
  # `api` embedder type when keys are available.

  # ---- Turkish models (extension beyond EN/PT) ----
  - name: BERTurk
    type: transformer
    hf_id: dbmdz/bert-base-turkish-cased
    last_n_layers: 4

  # ---- Modern open decoder-only LLMs (base/PT, <15B) ----
  # Qwen3-4B-Base: Qwen3ForCausalLM, Apache-2.0, pure-text. ALREADY RUN (runs/qwen4_en).
  # Kept as a 2025-generation reference point against the newer Qwen3.5 below.
  - name: Qwen3-4B-Base
    type: causal
    hf_id: Qwen/Qwen3-4B-Base
    last_n_layers: 4
    dtype: float16

  # Qwen3.5 base ladder (2026 generation). Linear-attention arch -> torch/MPS falls back to a slow
  # CPU path, so we use the `mlx_causal` embedder (MLX, native Apple Silicon, ~17ms/forward).
  # mlx-lm converts the base HF checkpoint on the fly (keeps base/full-precision). NOTE: MLX path
  # reports the FINAL hidden state, not the last-4-layer mean used by the torch embedders.
  # Apache-2.0, ungated. Primary = 9B (<15B); 0.8B/2B/4B give a scaling curve + cheap validation.
  - name: Qwen3.5-9B-Base
    type: mlx_causal
    hf_id: Qwen/Qwen3.5-9B-Base
    last_n_layers: 4
    dtype: float16

  - name: Qwen3.5-4B-Base
    type: mlx_causal
    hf_id: Qwen/Qwen3.5-4B-Base
    last_n_layers: 4
    dtype: float16

  - name: Qwen3.5-2B-Base
    type: mlx_causal
    hf_id: Qwen/Qwen3.5-2B-Base
    last_n_layers: 4
    dtype: float16

  - name: Qwen3.5-0.8B-Base # tiny -> quick validation
    type: mlx_causal
    hf_id: Qwen/Qwen3.5-0.8B-Base
    last_n_layers: 4
    dtype: float16

  # Qwen3.5 INSTRUCT pre-converted MLX versions (no base MLX exists for 2B/4B/9B).
  # Fast: download the already-MLX weights, no convert. NOTE: instruct, not base -> alignment
  # tuning shifts representation geometry; label results as 'instruct' when comparing to base.
  - name: Qwen3.5-2B-it       # mlx-community, bf16, from Qwen/Qwen3.5-2B
    type: mlx_causal
    hf_id: mlx-community/Qwen3.5-2B-MLX-bf16

  - name: Qwen3.5-4B-it       # mlx-community, 8bit, from Qwen/Qwen3.5-4B
    type: mlx_causal
    hf_id: mlx-community/Qwen3.5-4B-MLX-8bit

  - name: Qwen3.5-9B-it       # lmstudio-community, 4bit, from Qwen/Qwen3.5-9B
    type: mlx_causal
    hf_id: lmstudio-community/Qwen3.5-9B-MLX-4bit

  # ---- Gemma via MLX (downloaded for offline runs) ----
  # Gemma 3 (pt=base) is fully supported by mlx-lm -> works with mlx_causal.
  - name: Gemma3-1B-it          # tiny control (qat 4bit)
    type: mlx_causal
    hf_id: mlx-community/gemma-3-1b-it-qat-4bit

  - name: Gemma3-4B-pt          # Gemma 3 4B BASE, bf16
    type: mlx_causal
    hf_id: mlx-community/gemma-3-4b-pt-bf16

  - name: Gemma3-12B-pt         # Gemma 3 12B BASE, 6bit
    type: mlx_causal
    hf_id: mlx-community/gemma-3-12b-pt-6bit

  # Gemma 4 12B via MLX works through mlx-vlm>=0.6 (gemma4_unified). The mlx_causal embedder
  # falls back to mlx-vlm automatically when mlx-lm cannot load the model.
  - name: Gemma4-12B-it
    type: mlx_causal
    hf_id: mlx-community/gemma-4-12B-it-8bit

  - name: Gemma4-12B-base       # BASE Gemma 4 12B (mxfp8) -> fair vs Gemma3-12B-pt base
    type: mlx_causal
    hf_id: mlx-community/gemma-4-12B-mxfp8

  # ---- Gemma 4 via torch multimodal_causal (E2B/E4B effective; slow but works) ----
  # Gemma 4 uses standard attention -> works on MPS torch (unlike Qwen3.5's linear-attention fallback).
  - name: Gemma4-E2B-Base       # ~5B effective, smallest Gemma 4 (downloaded)
    type: multimodal_causal
    hf_id: google/gemma-4-E2B
    last_n_layers: 4
    dtype: float16

  - name: Gemma4-12B-Base
    type: multimodal_causal
    hf_id: google/gemma-4-12B
    last_n_layers: 4
    dtype: float16

  - name: Gemma4-E4B-Base
    type: multimodal_causal
    hf_id: google/gemma-4-E4B
    last_n_layers: 4
    dtype: float16

  # ---- Static baselines (provide local paths) ----
  # - name: GloVe
  #   type: static
  #   path: /path/to/glove.840B.300d.w2vformat.txt
  #   no_header: false
