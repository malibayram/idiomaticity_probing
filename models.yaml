# Model registry for the idiomaticity probing framework.
#
# Each entry becomes a pluggable embedder. `type` selects the embedder implementation:
#   static      -> gensim KeyedVectors (Word2Vec / GloVe / fastText)   [needs `path`]
#   transformer -> HuggingFace AutoModel encoder (BERT, XLM-R, BERTurk) [needs `hf_id`]
#   causal      -> HuggingFace AutoModelForCausalLM (Llama, Qwen, ...)  [needs `hf_id`]
#   sentence    -> sentence-transformers (SBERT, BGE, E5, GTE)          [needs `hf_id`]
#   mock        -> dependency-free deterministic vectors (smoke test only)
#
# Run a subset with: scripts/run_experiment.py --models models.yaml --select mBERT XLM-R-large
#
# ============================================================================
# SELECTED STUDY: lightweight EN+PT cohort (encoder + embedding models, CPU-friendly).
# All models below are multilingual, so they cover both EN and PT in one run.
#
#   OLD (paper-era):  mBERT  DistilBERT-ML  mSBERT
#   NEW (modern):     XLM-R-large  BGE-M3  E5-large
#
# Reproduce the central comparison:
#   python scripts/run_experiment.py --models models.yaml \
#       --select mBERT DistilBERT-ML mSBERT XLM-R-large BGE-M3 E5-large \
#       --data data/ncimp --lang EN --context naturalistic neutral --level nc --out runs/en
#   python scripts/analyze.py --results runs/en/results.csv --out runs/en --level nc \
#       --old mBERT DistilBERT-ML mSBERT --new XLM-R-large BGE-M3 E5-large
# (repeat with --lang PT for Portuguese)
# ============================================================================

models:
  # ---- Smoke test (no downloads) ----
  - name: mock
    type: mock
    dim: 128

  # ---- Models from the original paper ----
  - name: mBERT
    type: transformer
    hf_id: bert-base-multilingual-cased
    last_n_layers: 4

  - name: DistilBERT-ML
    type: transformer
    hf_id: distilbert-base-multilingual-cased
    last_n_layers: 4

  - name: mSBERT
    type: sentence
    hf_id: sentence-transformers/distiluse-base-multilingual-cased

  # ---- New / modern models to extend the study (Phase 7) ----
  - name: XLM-R-large
    type: transformer
    hf_id: xlm-roberta-large
    last_n_layers: 4

  - name: BGE-M3
    type: sentence
    hf_id: BAAI/bge-m3

  - name: E5-large
    type: sentence
    hf_id: intfloat/multilingual-e5-large

  # ---- Modern SOTA embedding models (sentence-level) ----
  # METHODOLOGY: these are sentence-embedding models. In our framework they map to `sentence`:
  #   --level sentence  -> full-sentence embedding (paper's sentence level)
  #   --level nc        -> ISOLATED PHRASE embedding (the span text re-encoded on its own)
  # They do NOT give a *contextual token span* (unlike BERT/XLM-R/Qwen hidden states). Label
  # results accordingly. Great for the sentence-level analysis + ordinary-perturbation control.
  - name: Qwen3-Emb-0.6B
    type: sentence
    hf_id: Qwen/Qwen3-Embedding-0.6B

  - name: Qwen3-Emb-4B
    type: sentence
    hf_id: Qwen/Qwen3-Embedding-4B
    dtype: float16

  - name: Qwen3-Emb-8B            # Qwen card: ~70.58 multilingual MTEB (SOTA line)
    type: sentence
    hf_id: Qwen/Qwen3-Embedding-8B
    dtype: float16

  - name: mE5-large-instruct      # instruct variant of E5; 94 languages
    type: sentence
    hf_id: intfloat/multilingual-e5-large-instruct

  - name: gte-Qwen2-1.5B-instruct
    type: sentence
    hf_id: Alibaba-NLP/gte-Qwen2-1.5B-instruct
    trust_remote_code: true

  - name: gte-Qwen2-7B-instruct   # strong EN/ZH MTEB; heavier
    type: sentence
    hf_id: Alibaba-NLP/gte-Qwen2-7B-instruct
    trust_remote_code: true
    dtype: float16

  - name: llama-embed-nemotron-8b # NVIDIA: multilingual MTEB SOTA (Oct 2025). NON-COMMERCIAL license.
    type: sentence
    hf_id: nvidia/llama-embed-nemotron-8b
    trust_remote_code: true
    dtype: float16

  - name: NV-Embed-v2             # MTEB #1 (2024). Custom code; may need special pooling.
    type: sentence
    hf_id: nvidia/NV-Embed-v2
    trust_remote_code: true
    dtype: float16

  - name: bge-en-icl             # BGE few-shot/in-context embedding; English-focused
    type: sentence
    hf_id: BAAI/bge-en-icl
    dtype: float16

  # ---- API embedding models (need an `api` embedder + keys; not yet implemented) ----
  # gemini-embedding-2 / voyage-4-large / cohere embed-v4.0 / text-embedding-3-large
  # These return sentence/phrase embeddings only (no contextual span). Add via a future
  # `api` embedder type when keys are available.

  # ---- Turkish models (extension beyond EN/PT) ----
  - name: BERTurk
    type: transformer
    hf_id: dbmdz/bert-base-turkish-cased
    last_n_layers: 4

  # ---- Modern open decoder-only LLMs (base/PT, pure-text, <15B) ----
  # Qwen3 base ladder: clean scaling study within the newest open generation.
  # All are Qwen3ForCausalLM, Apache-2.0, ungated -> work with the `causal` embedder as-is.
  - name: Qwen3-4B-Base
    type: causal
    hf_id: Qwen/Qwen3-4B-Base
    last_n_layers: 4
    dtype: float16

  - name: Qwen3-8B-Base
    type: causal
    hf_id: Qwen/Qwen3-8B-Base
    last_n_layers: 4
    dtype: float16

  - name: Qwen3-14B-Base
    type: causal
    hf_id: Qwen/Qwen3-14B-Base
    last_n_layers: 4
    dtype: float16

  # ---- Multimodal newest-gen (text path via multimodal_causal embedder) ----
  - name: Gemma4-12B-Base
    type: multimodal_causal
    hf_id: google/gemma-4-12B
    last_n_layers: 4
    dtype: float16

  - name: Gemma4-E4B-Base
    type: multimodal_causal
    hf_id: google/gemma-4-E4B
    last_n_layers: 4
    dtype: float16

  # ---- Static baselines (provide local paths) ----
  # - name: GloVe
  #   type: static
  #   path: /path/to/glove.840B.300d.w2vformat.txt
  #   no_header: false
